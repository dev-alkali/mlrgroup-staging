name: Secure Deploy Theme via SFTP

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund

      - name: Compile Tailwind CSS
        run: npx tailwindcss -i ./assets/src/input.css -o ./assets/dist/output.css --minify

      # 🔐 Secure SSH Setup using ssh-agent
      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SFTP_PRIVATE_KEY }}

      # 🔐 Add host fingerprint (Prevents MITM)
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      # 🔐 Deploy only theme folder (NOT entire repo)
      - name: Deploy Theme via rsync
        run: |
          rsync -az --delete \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=.github \
          --exclude=*.log \
          -e "ssh -p ${SFTP_PORT:-22}" \
          ./ \
          ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/755960.cloudwaysapps.com/zyhttbsgaz/public_html/wp-content/themes/Mlrgroup/
        env:
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
