name: Build & Deploy WordPress Theme

on:
  push:
    branches:
      - main   # change if needed

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: npm ci --no-audit --no-fund

      # 4️⃣ Build Tailwind (uses your corrected script path)
      - name: Build Tailwind
        run: npm run build

      # 5️⃣ Setup SSH Key (NO ssh-agent)
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 6️⃣ Add server fingerprint (prevents MITM)
      - name: Add server to known_hosts
        run: |
          ssh-keyscan -p ${SFTP_PORT:-22} $SFTP_HOST >> ~/.ssh/known_hosts
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}

      # 7️⃣ Deploy via rsync
      - name: Deploy Theme
        run: |
          rsync -az --delete \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            ./ \
            $SFTP_USER@$SFTP_HOST:/home/755960.cloudwaysapps.com/zyhttbsgaz/public_html/wp-content/themes/Mlrgroup/ \
            -e "ssh -i ~/.ssh/id_rsa -p ${SFTP_PORT:-22}"
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}

      - name: Deployment Complete
        run: echo "Theme deployed successfully 🚀"
